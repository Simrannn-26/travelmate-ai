services:
  - type: web
    name: travelmate-api
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false     # Set in Render dashboard (secret)
      - key: JWT_SECRET
        generateValue: true
      # ... rest from dashboard